services:
  guardian-voice-bun:
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:5678/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  guardian-voice-openwebui:
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5002/health').status==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      guardian-voice-bun:
        condition: service_healthy
      guardian-voice-openwebui:
        condition: service_healthy
    ports:
      - "3000:8080"
    environment:
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-replace-me}
      AUDIO_STT_ENGINE: openai
      AUDIO_STT_OPENAI_API_BASE_URL: http://guardian-voice-bun:5678
      AUDIO_STT_OPENAI_API_KEY: ${TTS_API_KEY:-replace-with-your-api-key}
      AUDIO_STT_MODEL: ${STT_DEFAULT_MODEL:-whisper-1}
      AUDIO_TTS_ENGINE: openai
      AUDIO_TTS_OPENAI_API_BASE_URL: http://guardian-voice-bun:5678
      AUDIO_TTS_OPENAI_API_KEY: ${TTS_API_KEY:-replace-with-your-api-key}
      AUDIO_TTS_MODEL: tts-1
      AUDIO_TTS_VOICE: ${VOICEBOX_DEFAULT_VOICE:-default}
      AUDIO_TTS_SPLIT_ON: punctuation
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - open-webui-data:/app/backend/data

volumes:
  open-webui-data:
